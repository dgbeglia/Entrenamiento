<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2906/2906496.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2906/2906496.png">

    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --accent: #f59e0b; --rest: #10b981; }
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px 10px; }
        .container { max-width: 500px; margin: 0 auto; width: 100%; }
        h1 { text-align: center; color: var(--primary); margin: 10px 0; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .setup-section, .timer-section { background: var(--card); padding: 18px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; width: 100%; }
        .settings-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.75rem; font-weight: bold; margin-bottom: 4px; color: #64748b; }
        input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; width: 100%; }
        .exercise-item { display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; padding: 10px; margin-top: 8px; border-radius: 8px; border-left: 4px solid var(--primary); }
        .workout-list { margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 15px; }
        .workout-list-item { padding: 8px; font-size: 0.9rem; border-bottom: 1px solid #f1f5f9; color: #94a3b8; display: flex; justify-content: space-between; }
        .workout-list-item.active { color: var(--primary); font-weight: bold; background: #eff6ff; border-radius: 6px; }
        .workout-list-item.done { text-decoration: line-through; opacity: 0.5; }
        button { cursor: pointer; border: none; border-radius: 8px; padding: 14px; font-weight: bold; width: 100%; font-size: 1rem; }
        .btn-add { background: #10b981; color: white; margin-top: 10px; }
        .btn-start { background: var(--primary); color: white; margin-top: 20px; }
        .btn-delete { background: #ef4444; color: white; width: auto; padding: 5px 10px; font-size: 0.75rem; }
        .btn-pause { background: var(--accent); color: white; margin-top: 20px; }
        .btn-reset { background: #64748b; color: white; margin-top: 10px; }
        #display-timer { font-size: 5rem; text-align: center; font-weight: 800; margin: 10px 0; color: var(--primary); }
        .status-tag { text-align: center; font-weight: 900; text-transform: uppercase; font-size: 1.1rem; }
        .hidden { display: none; }
        .bg-rest { background-color: #d1fae5 !important; }
        .text-rest { color: var(--rest) !important; }
        #wake-lock-status { font-size: 0.7rem; text-align: center; color: #94a3b8; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1><img src="https://cdn-icons-png.flaticon.com/512/2906/2906496.png" width="30"> Workout Pro</h1>

    <div id="setup" class="setup-section">
        <div class="settings-grid">
            <div class="input-group"><label>Rondas</label><input type="number" id="total-rounds" value="4"></div>
            <div class="input-group"><label>Desc. Ejerc.</label><input type="number" id="ex-rest" value="10"></div>
            <div class="input-group"><label>Desc. Ronda</label><input type="number" id="round-rest" value="60"></div>
        </div>
        
        <h3>Lista de Ejercicios</h3>
        <div id="exercise-list"></div>
        
        <div style="margin-top:15px; padding-top: 15px; border-top: 2px solid #f1f5f9;">
            <div class="input-group">
                <label>Añadir Ejercicio</label>
                <input type="text" id="ex-name" placeholder="Nombre (ej: Flexiones)">
                <input type="number" id="ex-time" placeholder="Segundos" style="margin-top:8px">
            </div>
            <button class="btn-add" onclick="addExercise()">+ Añadir Ejercicio</button>
        </div>
        <button class="btn-start" onclick="startWorkout()">🚀 EMPEZAR ENTRENAMIENTO</button>
    </div>

    <div id="timer-screen" class="timer-section hidden">
        <div id="status-label" class="status-tag">TRABAJO</div>
        <h2 id="current-ex-name" style="margin: 5px 0; text-align: center;">-</h2>
        <div id="display-timer">00</div>
        <div style="text-align: center; font-weight: bold;">Ronda: <span id="cur-round">1</span>/<span id="max-round">4</span></div>
        <div id="workout-progress-list" class="workout-list"></div>
        
        <button id="pause-btn" class="btn-pause" onclick="togglePause()">⏸ Detener</button>
        
        <button class="btn-reset" onclick="stopWorkout()">⏹ Restablecer</button>
        
        <div id="wake-lock-status">Pantalla siempre encendida</div>
    </div>
</div>

<audio id="alarm-sound"></audio>

<script>
    let exercises = [];
    let currentExIndex = 0;
    let currentRound = 1;
    let timeLeft = 0;
    let timerInterval;
    let mode = 'WORK';
    let wakeLock = null;
    let isPaused = false; // Nueva variable para controlar la pausa

    function decir(texto) {
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(texto);
            utterance.lang = 'es-ES';
            utterance.rate = 1; 
            window.speechSynthesis.speak(utterance);
        }
    }

    async function requestWakeLock() {
        try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
    }

    function addExercise() {
        const name = document.getElementById('ex-name').value;
        const time = parseInt(document.getElementById('ex-time').value);
        if (name && time) {
            exercises.push({ name, time });
            renderExercises();
            document.getElementById('ex-name').value = '';
            document.getElementById('ex-time').value = '';
        }
    }

    function renderExercises() {
        const list = document.getElementById('exercise-list');
        list.innerHTML = exercises.length === 0 ? '<p style="text-align:center; font-size:0.9rem;">Vacío</p>' : '';
        exercises.forEach((ex, index) => {
            list.innerHTML += `<div class="exercise-item"><span>${ex.name} (${ex.time}s)</span><button class="btn-delete" onclick="exercises.splice(${index},1); renderExercises()">X</button></div>`;
        });
    }

    function updateProgressList() {
        const listDiv = document.getElementById('workout-progress-list');
        listDiv.innerHTML = '<strong>Hoja de ruta:</strong><br>';
        exercises.forEach((ex, index) => {
            let statusClass = (index < currentExIndex) ? 'done' : (index === currentExIndex && mode === 'WORK' ? 'active' : '');
            listDiv.innerHTML += `<div class="workout-list-item ${statusClass}"><span>${index + 1}. ${ex.name}</span><span>${ex.time}s</span></div>`;
        });
    }

    async function startWorkout() {
        if (exercises.length === 0) return alert("Agrega ejercicios primero");
        await requestWakeLock();
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('timer-screen').classList.remove('hidden');
        document.getElementById('max-round').innerText = document.getElementById('total-rounds').value;
        mode = 'WORK';
        isPaused = false;
        decir("Entrenar"); 
        runStep();
    }

    function stopWorkout() {
        if (wakeLock !== null) wakeLock.release().then(() => wakeLock = null);
        location.reload();
    }

    // Función para pausar/continuar
    function togglePause() {
        isPaused = !isPaused;
        const btn = document.getElementById('pause-btn');
        if (isPaused) {
            btn.innerText = "▶ Continuar";
            btn.style.background = "#10b981"; // Cambia a verde al pausar
        } else {
            btn.innerText = "⏸ Detener";
            btn.style.background = "var(--accent)"; // Vuelve a naranja
        }
    }

    function runStep() {
        const statusLabel = document.getElementById('status-label');
        const nameLabel = document.getElementById('current-ex-name');
        const timerCard = document.getElementById('timer-screen');
        const timerDisplay = document.getElementById('display-timer');

        if (mode === 'WORK') {
            statusLabel.innerText = "💪 TRABAJO";
            statusLabel.className = "status-tag";
            timerCard.classList.remove('bg-rest');
            timerDisplay.classList.remove('text-rest');
            nameLabel.innerText = exercises[currentExIndex].name;
            timeLeft = exercises[currentExIndex].time;
        } else {
            statusLabel.innerText = mode === 'EX_REST' ? "🥤 DESCANSO BREVE" : "🧘 DESCANSO RONDA";
            statusLabel.className = "status-tag text-rest";
            timerCard.classList.add('bg-rest');
            timerDisplay.classList.add('text-rest');
            nameLabel.innerText = "Prepárate...";
            timeLeft = mode === 'EX_REST' ? parseInt(document.getElementById('ex-rest').value) : parseInt(document.getElementById('round-rest').value);
            decir("Descansar");
        }

        updateProgressList();
        document.getElementById('cur-round').innerText = currentRound;
        updateDisplay();

        if (timerInterval) clearInterval(timerInterval);

        timerInterval = setInterval(() => {
            if (!isPaused) { // Solo resta tiempo si NO está pausado
                timeLeft--;
                updateDisplay();
                
                if (mode !== 'WORK' && timeLeft === 2) {
                    decir("Prepárate");
                }

                if (timeLeft < 0) {
                    clearInterval(timerInterval);
                    if (mode !== 'WORK') decir("Entrenar");
                    handleLogic();
                }
            }
        }, 1000);
    }

    function handleLogic() {
        if (mode === 'WORK') {
            if (currentExIndex >= exercises.length - 1) {
                if (currentRound >= parseInt(document.getElementById('total-rounds').value)) {
                    stopWorkout();
                    decir("Entrenamiento terminado");
                    alert("¡TERMINADO!");
                    return;
                } else { mode = 'ROUND_REST'; }
            } else { mode = 'EX_REST'; }
        } else {
            if (mode === 'ROUND_REST') { currentRound++; currentExIndex = 0; } 
            else { currentExIndex++; }
            mode = 'WORK';
        }
        runStep();
    }

    function updateDisplay() {
        document.getElementById('display-timer').innerText = timeLeft < 0 ? 0 : timeLeft;
    }

    function playBeep() {}
    function playLongBeep() {}
    function playDoubleBeep() {}
</script>

</body>
</html>
